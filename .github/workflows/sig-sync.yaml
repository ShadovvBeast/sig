name: sig-sync

on:
  # Primary trigger: Cloud Run watcher fires this on new upstream commits (~30s latency)
  repository_dispatch:
    types: [upstream-push]
  # Fallback: poll every 5 minutes in case the watcher is down
  schedule:
    - cron: '*/5 * * * *'
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Sig  # [sig] Use our own setup-sig action
        uses: ./tools/setup-sig
        with:
          version: latest

      - name: Add upstream Codeberg remote
        run: |
          git remote add upstream-zig https://codeberg.org/ziglang/zig.git || true
          git fetch upstream-zig

      - name: Check for new commits
        id: check
        run: |
          LAST=$(jq -r '.last_integrated_commit' tools/sig_sync/manifest.json)
          LATEST=$(git rev-parse upstream-zig/master)
          if [ "$LAST" = "$LATEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No new upstream commits"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "New commits: $LAST..$LATEST"
          fi

      - name: Configure git
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "sig-sync[bot]"
          git config user.email "sig-sync@users.noreply.github.com"

      - name: Build and run sig-sync
        if: steps.check.outputs.skip != 'true'
        run: |
          sig build run-sig-sync -- --remote upstream-zig --branch master
        timeout-minutes: 30

      - name: Push to GitHub (ShadovvBeast/sig master)
        if: steps.check.outputs.skip != 'true'
        run: git push origin HEAD:master

      - name: Push to Codeberg fork (ShadowBeast/zig sig branch)
        if: steps.check.outputs.skip != 'true' && env.HAS_CODEBERG == 'true'
        run: |
          git remote add codeberg-fork https://${{ secrets.CODEBERG_USER }}:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/ShadowBeast/zig.git || true
          git push codeberg-fork HEAD:sig
        env:
          HAS_CODEBERG: ${{ secrets.CODEBERG_TOKEN != '' }}

      - name: Run Sig tests  # [sig] Verify Sig tests still pass after sync
        if: steps.check.outputs.skip != 'true'
        run: sig build test-sig
        timeout-minutes: 30

      - name: Verify identical output  # [sig] Regression gate after sync
        if: steps.check.outputs.skip != 'true'
        run: sig build --verify-identical
        timeout-minutes: 60

      - name: Check for conflicts
        if: steps.check.outputs.skip != 'true'
        run: |
          if grep -q '"conflict"' tools/sig_sync/manifest.json; then
            echo "::warning::Sync encountered conflicts — check manifest for details"
            exit 1
          fi

      - name: Regenerate README
        if: steps.check.outputs.skip != 'true'
        run: |
          sig build run-sig-readme || true
          if git diff --quiet README.md tools/sig_sync/manifest.json; then
            echo "README unchanged"
          else
            git add README.md tools/sig_sync/manifest.json
            git commit -m "sig-sync: update manifest and README"
            git push origin HEAD:master
          fi

      # [sig] Trigger release build after successful sync
      - name: Trigger release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type=sig-release
