# [sig] Build LLVM 21 and upload as a reusable artifact
name: build-llvm

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build python3 zlib1g-dev libzstd-dev

      - name: Build LLVM 21
        run: |
          git clone --depth 1 --branch llvmorg-21.1.2 https://github.com/llvm/llvm-project.git llvm-src
          cmake -S llvm-src/llvm -B llvm-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/llvm-21" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;AMDGPU;ARM;AVR;BPF;Hexagon;Lanai;LoongArch;Mips;MSP430;NVPTX;PowerPC;RISCV;Sparc;SystemZ;VE;WebAssembly;X86;XCore" \
            -DLLVM_EXPERIMENTAL_TARGETS_TO_BUILD="M68k;Xtensa;ARC;CSKY;SPIRV" \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_ZLIB=FORCE_ON \
            -DLLVM_ENABLE_ZSTD=FORCE_ON \
            -DLLVM_USE_STATIC_ZSTD=ON \
            -DLLVM_STATIC_LINK_CXX_STDLIB=ON \
            -DCLANG_ENABLE_ARCMT=OFF \
            -DCLANG_ENABLE_STATIC_ANALYZER=ON \
            -DLLVM_ENABLE_BINDINGS=OFF \
            -DLLVM_ENABLE_OCAMLDOC=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF
          ninja -C llvm-build install -j$(nproc)
        timeout-minutes: 120

      - name: Package LLVM
        run: tar -cJf llvm-21-x86_64-linux.tar.xz llvm-21/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create llvm-21 --title "LLVM 21 (build artifact)" \
            --notes "Pre-built LLVM 21.1.2 with Clang + LLD for x86_64-linux. Used as bootstrap dependency for sig releases." \
            --prerelease \
            llvm-21-x86_64-linux.tar.xz
