# [sig] Adaptive release pipeline — bootstrap (fast) or cmake (slow)
#
# Set ONE of these env vars, comment out the other:
#   BOOTSTRAP_URL → downloads a pre-built sig binary (fast path)
#   LLVM_URL      → cmake bootstrap from LLVM (slow path)
name: release

on:
  repository_dispatch:
    types: [sig-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.4)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  # LLVM_URL: https://github.com/SB0LTD/sig/releases/download/llvm-21/llvm-21-x86_64-linux.tar.xz
  BOOTSTRAP_URL: https://github.com/SB0LTD/sig/releases/download/bootstrap-sig-v2/bootstrap-sig-x86_64-linux.tar.gz

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            zig_target: x86_64-linux-musl
            ext: tar.xz
          - target: aarch64-linux
            zig_target: aarch64-linux-musl
            ext: tar.xz
          - target: aarch64-macos
            zig_target: aarch64-macos
            ext: tar.xz
          - target: x86_64-windows
            zig_target: x86_64-windows
            ext: zip
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and detect mode
        id: version
        run: |
          # --- Detect pipeline mode ---
          if [ -n "$BOOTSTRAP_URL" ]; then
            echo "MODE=bootstrap" >> "$GITHUB_ENV"
            echo "mode=bootstrap" >> "$GITHUB_OUTPUT"
          else
            echo "MODE=cmake" >> "$GITHUB_ENV"
            echo "mode=cmake" >> "$GITHUB_OUTPUT"
          fi

          # --- Resolve sig version ---
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIG_VER="${{ inputs.version }}"
          else
            SIG_MAJOR=$(grep -oP 'sig_version.*major = \K\d+' build.sig)
            SIG_MINOR=$(grep -oP 'sig_version.*minor = \K\d+' build.sig)
            SIG_PATCH=$(grep -oP 'sig_version.*patch = \K\d+' build.sig)
            SIG_PRE=$(grep -oP 'sig_version.*pre = "\K[^"]+' build.sig || true)
            [ -n "$SIG_PRE" ] && SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}-${SIG_PRE}" || SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}"
          fi
          ZIG_MAJOR=$(grep -oP 'zig_version.*major = \K\d+' build.sig)
          ZIG_MINOR=$(grep -oP 'zig_version.*minor = \K\d+' build.sig)
          ZIG_PATCH=$(grep -oP 'zig_version.*patch = \K\d+' build.sig)
          VERSION="${SIG_VER}+zig${ZIG_MAJOR}.${ZIG_MINOR}.${ZIG_PATCH}.$(git rev-parse --short=7 HEAD)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # ============================================================
      # Fast path: download pre-built sig binary
      # ============================================================
      - name: Cache bootstrap binary
        if: env.MODE == 'bootstrap'
        uses: actions/cache@v4
        with:
          path: /tmp/bootstrap-sig
          key: bootstrap-sig-${{ hashFiles('.github/workflows/release.yaml') }}
          restore-keys: bootstrap-sig-

      - name: Download pre-built sig
        if: env.MODE == 'bootstrap'
        run: |
          mkdir -p /tmp/bootstrap-sig
          curl -fsSL "$BOOTSTRAP_URL" -o /tmp/bootstrap-sig.tar
          tar -xf /tmp/bootstrap-sig.tar -C /tmp/bootstrap-sig
          chmod +x /tmp/bootstrap-sig/bin/sig
          echo "/tmp/bootstrap-sig/bin" >> "$GITHUB_PATH"
          /tmp/bootstrap-sig/bin/sig version

      # ============================================================
      # Slow path: cmake bootstrap from LLVM
      # ============================================================
      - name: Install build dependencies
        if: env.MODE == 'cmake'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build zlib1g-dev libzstd-dev

      - name: Download pre-built LLVM 21
        if: env.MODE == 'cmake'
        run: |
          curl -fsSL "$LLVM_URL" -o /tmp/llvm.tar.xz
          tar -xJf /tmp/llvm.tar.xz -C /tmp

      - name: Build bootstrap via cmake
        if: env.MODE == 'cmake'
        run: |
          export PATH="/tmp/llvm-21/bin:$PATH"
          mv build.sig build.sig.bak
          mkdir build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="/tmp/llvm-21" \
            -DCMAKE_INSTALL_PREFIX="$PWD/../bootstrap-sig" \
            -DZIG_USE_LLVM_CONFIG=ON
          ninja install -j$(nproc)
          cd ..
          mv build.sig.bak build.sig
          chmod +x bootstrap-sig/bin/sig
          echo "$PWD/bootstrap-sig/bin" >> "$GITHUB_PATH"
          bootstrap-sig/bin/sig version
        timeout-minutes: 60

      # ============================================================
      # Both paths converge here
      # ============================================================
      - name: Build sig for ${{ matrix.target }}
        run: |
          sig build \
            --zig-lib-dir lib \
            -Dtarget=${{ matrix.zig_target }} \
            -Doptimize=ReleaseSafe \
            -Dno-lib \
            -Dno-langref \
            -Dskip-tests \
            --prefix "sig-${VERSION}-${{ matrix.target }}" \
            --maxrss 0 \
            --verbose || true
          # List what was produced
          echo "=== Output directory contents ==="
          find "sig-${VERSION}-${{ matrix.target }}" -type f 2>/dev/null || echo "(directory not found)"
        timeout-minutes: 120
        continue-on-error: true

      - name: Install lib files
        run: sig build --zig-lib-dir lib -Dlib-files-only --prefix "sig-${VERSION}-${{ matrix.target }}" --maxrss 0 || true
        timeout-minutes: 10
        continue-on-error: true

      - name: Package tarball
        if: matrix.ext == 'tar.xz'
        run: |
          if [ -d "sig-${VERSION}-${{ matrix.target }}" ]; then
            ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
            tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
            echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          else
            echo "No output directory — skipping packaging"
          fi

      - name: Package zip
        if: matrix.ext == 'zip'
        run: |
          if [ -d "sig-${VERSION}-${{ matrix.target }}" ]; then
            ARCHIVE="sig-${VERSION}-${{ matrix.target }}.zip"
            cd "sig-${VERSION}-${{ matrix.target }}" && zip -r "../${ARCHIVE}" . && cd ..
            echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          else
            echo "No output directory — skipping packaging"
          fi

      - name: Generate checksum
        if: env.ARCHIVE != ''
        run: sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - name: Upload artifact
        if: env.ARCHIVE != ''
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sig-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          cat *.sha256 > sha256sums.txt
          PRERELEASE="${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true') && '--prerelease' || '' }}"
          gh release create "sig-${VERSION}" --title "Sig ${VERSION}" \
            --notes "Sig ${VERSION} — built with the zero-allocator sig build system

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          Built by the sig build runner. No std.Build. Checksums in sha256sums.txt." \
            ${PRERELEASE} sig-*.tar.xz sig-*.zip sha256sums.txt
