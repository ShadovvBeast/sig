# [sig] Build and publish Sig compiler releases
name: release

on:
  # Auto-triggered by sig-sync after successful upstream merge
  repository_dispatch:
    types: [sig-release]
  # Manual trigger for tagged releases
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIG_VER="${{ inputs.version }}"
            echo "is_prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            # Auto-release: use sig_version from build.sig
            SIG_VER=$(grep -oP 'sig_version = "\K[^"]+' build.sig || echo "0.0.1-dev")
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          # Get the full zig version from git describe (same logic as build.sig)
          # This already includes the zig commit hash (e.g. 0.16.0-dev.3036+aed7a6e1f)
          ZIG_BASE=$(grep -oP 'zig_version.*major = \K\d+' build.sig).$(grep -oP 'zig_version.*minor = \K\d+' build.sig).$(grep -oP 'zig_version.*patch = \K\d+' build.sig)
          GIT_DESC=$(git describe --match "*.*.*" --tags --abbrev=9 2>/dev/null || echo "${ZIG_BASE}")
          # Get short sig commit hash (HEAD of the sig branch)
          SIG_HASH=$(git rev-parse --short=10 HEAD)
          # Build version: {sig_ver}+zig{zig_desc}.sig.{sig_hash}
          VERSION="${SIG_VER}+zig${GIT_DESC}.sig.${SIG_HASH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sig_version=${SIG_VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved: sig=${SIG_VER}, zig=${GIT_DESC}, sig_hash=${SIG_HASH}, full=${VERSION}"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            ext: tar.xz
          - target: aarch64-linux
            os: ubuntu-latest
            ext: tar.xz
          - target: aarch64-macos
            os: ubuntu-latest
            ext: tar.xz
          - target: x86_64-windows
            os: ubuntu-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Sig compiler  # [sig] Self-hosting: use setup-sig, fall back to zig for bootstrap
        id: install-sig
        uses: ./tools/setup-sig
        with:
          version: latest
        continue-on-error: true

      - name: Bootstrap fallback — install upstream Zig if no Sig release exists yet
        if: steps.install-sig.outcome == 'failure'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3006+94355f192

      - name: Build release binary
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          # Map matrix target to zig target triple
          case "$TARGET" in
            x86_64-linux)    ZIG_TARGET="x86_64-linux-musl" ;;
            aarch64-linux)   ZIG_TARGET="aarch64-linux-musl" ;;
            aarch64-macos)   ZIG_TARGET="aarch64-macos" ;;
            x86_64-windows)  ZIG_TARGET="x86_64-windows" ;;
          esac

          # Use sig if available, otherwise zig (bootstrap only)
          if command -v sig &>/dev/null; then
            COMPILER=sig
          else
            COMPILER=zig
          fi
          echo "Building for ${ZIG_TARGET} with ${COMPILER}..."
          $COMPILER build \
            -Dtarget="${ZIG_TARGET}" \
            -Doptimize=ReleaseSafe \
            --prefix "sig-${VERSION}-${TARGET}" \
            --maxrss 0
        timeout-minutes: 120

      - name: Package tarball (Linux/macOS)
        if: matrix.ext == 'tar.xz'
        shell: bash
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
          tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $archive = "sig-${env:VERSION}-${{ matrix.target }}.zip"
          Compress-Archive -Path "sig-${env:VERSION}-${{ matrix.target }}" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"
          else
            shasum -a 256 "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Combine checksums
        run: |
          cd artifacts
          cat *.sha256 > sha256sums.txt
          echo "=== sha256sums.txt ==="
          cat sha256sums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          # Tag format: sig-{version} — the sig- prefix prevents git describe *.*.*  matching
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="sig-${VERSION}"
            TITLE="Sig ${VERSION}"
            PRERELEASE="${{ inputs.prerelease == 'true' && '--prerelease' || '' }}"
          else
            TAG="sig-${VERSION}"
            TITLE="Sig ${VERSION}"
            PRERELEASE="--prerelease"
          fi

          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes "Sig ${VERSION} — Strict Zig compiler release.

          ## Downloads

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          Checksums are in \`sha256sums.txt\`." \
            ${PRERELEASE} \
            sig-*.tar.xz sig-*.zip sha256sums.txt
