# [sig] Build and publish Sig compiler releases — native builds on all platforms
name: release

on:
  repository_dispatch:
    types: [sig-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIG_VER="${{ inputs.version }}"
            echo "is_prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            SIG_MAJOR=$(grep -oP 'sig_version.*major = \K\d+' build.sig)
            SIG_MINOR=$(grep -oP 'sig_version.*minor = \K\d+' build.sig)
            SIG_PATCH=$(grep -oP 'sig_version.*patch = \K\d+' build.sig)
            SIG_PRE=$(grep -oP 'sig_version.*pre = "\K[^"]+' build.sig || true)
            if [ -n "$SIG_PRE" ]; then
              SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}-${SIG_PRE}"
            else
              SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}"
            fi
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          ZIG_MAJOR=$(grep -oP 'zig_version.*major = \K\d+' build.sig)
          ZIG_MINOR=$(grep -oP 'zig_version.*minor = \K\d+' build.sig)
          ZIG_PATCH=$(grep -oP 'zig_version.*patch = \K\d+' build.sig)
          ZIG_VER="${ZIG_MAJOR}.${ZIG_MINOR}.${ZIG_PATCH}"
          SIG_HASH=$(git rev-parse --short=7 HEAD)
          VERSION="${SIG_VER}+zig${ZIG_VER}.${SIG_HASH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: sig=${SIG_VER}, zig=${ZIG_VER}, hash=${SIG_HASH}, full=${VERSION}"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            ext: tar.xz
          - target: aarch64-linux
            os: ubuntu-24.04-arm
            ext: tar.xz
          - target: aarch64-macos
            os: macos-latest
            ext: tar.xz
          - target: x86_64-windows
            os: windows-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Sig compiler
        uses: ./tools/setup-sig
        with:
          version: latest

      - name: Build release binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "Building natively on ${{ matrix.os }} for ${{ matrix.target }}..."
          sig build \
            -Doptimize=ReleaseSafe \
            -Dno-lib \
            -Dno-langref \
            --prefix "sig-${VERSION}-${{ matrix.target }}" \
            --maxrss 0
        timeout-minutes: 120

      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Building natively on ${{ matrix.os }} for ${{ matrix.target }}..."
          sig build `
            -Doptimize=ReleaseSafe `
            -Dno-lib `
            -Dno-langref `
            --prefix "sig-${env:VERSION}-${{ matrix.target }}" `
            --maxrss 0
        timeout-minutes: 120

      - name: Install lib files (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          sig build \
            -Dlib-files-only \
            --prefix "sig-${VERSION}-${{ matrix.target }}" \
            --maxrss 0
        timeout-minutes: 10

      - name: Install lib files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          sig build `
            -Dlib-files-only `
            --prefix "sig-${env:VERSION}-${{ matrix.target }}" `
            --maxrss 0
        timeout-minutes: 10

      - name: Package tarball (Linux/macOS)
        if: matrix.ext == 'tar.xz'
        shell: bash
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
          tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $archive = "sig-${env:VERSION}-${{ matrix.target }}.zip"
          Compress-Archive -Path "sig-${env:VERSION}-${{ matrix.target }}" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Benchmark build performance
        if: matrix.target == 'x86_64-linux'
        shell: bash
        run: |
          mkdir -p benchmark-results
          sig build --benchmark | tee benchmark-results/release-benchmark.txt
        timeout-minutes: 30
        continue-on-error: true

      - name: Upload benchmark results
        if: matrix.target == 'x86_64-linux'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-release-${{ matrix.target }}
          path: benchmark-results/
          if-no-files-found: ignore

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"
          else
            shasum -a 256 "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Combine checksums
        run: |
          cd artifacts
          cat *.sha256 > sha256sums.txt
          echo "=== sha256sums.txt ==="
          cat sha256sums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="sig-${VERSION}"
            TITLE="Sig ${VERSION}"
            PRERELEASE="${{ inputs.prerelease == 'true' && '--prerelease' || '' }}"
          else
            TAG="sig-${VERSION}"
            TITLE="Sig ${VERSION}"
            PRERELEASE="--prerelease"
          fi

          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes "Sig ${VERSION} — Strict Zig compiler release.

          ## Downloads

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          All binaries built natively on their target platform. No cross-compilation.

          Checksums are in \`sha256sums.txt\`." \
            ${PRERELEASE} \
            sig-*.tar.xz sig-*.zip sha256sums.txt
