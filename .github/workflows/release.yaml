# [sig] Release pipeline — cmake bootstrap + cross-compile + native Windows
name: release

on:
  repository_dispatch:
    types: [sig-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0-dev)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  LLVM_URL: https://github.com/SB0LTD/sig/releases/download/llvm-21/llvm-21-x86_64-linux.tar.xz

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIG_VER="${{ inputs.version }}"
          else
            SIG_MAJOR=$(sed -n 's/.*sig_version.*major = \([0-9]*\).*/\1/p' build.sig | head -1)
            SIG_MINOR=$(sed -n 's/.*sig_version.*minor = \([0-9]*\).*/\1/p' build.sig | head -1)
            SIG_PATCH=$(sed -n 's/.*sig_version.*patch = \([0-9]*\).*/\1/p' build.sig | head -1)
            SIG_PRE=$(sed -n 's/.*sig_version.*pre = "\([^"]*\)".*/\1/p' build.sig | head -1)
            [ -n "$SIG_PRE" ] && SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}-${SIG_PRE}" || SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}"
          fi
          ZIG_MAJOR=$(sed -n 's/.*zig_version.*major = \([0-9]*\).*/\1/p' build.sig | head -1)
          ZIG_MINOR=$(sed -n 's/.*zig_version.*minor = \([0-9]*\).*/\1/p' build.sig | head -1)
          ZIG_PATCH=$(sed -n 's/.*zig_version.*patch = \([0-9]*\).*/\1/p' build.sig | head -1)
          VERSION="${SIG_VER}+zig${ZIG_MAJOR}.${ZIG_MINOR}.${ZIG_PATCH}.$(git rev-parse --short=7 HEAD)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache LLVM
        uses: actions/cache@v4
        with:
          path: /tmp/llvm-21
          key: llvm-21-x86_64-linux-v1

      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build zlib1g-dev libzstd-dev

      - name: Download LLVM 21
        run: |
          if [ ! -d /tmp/llvm-21 ]; then
            curl -fsSL "$LLVM_URL" -o /tmp/llvm.tar.xz
            tar -xJf /tmp/llvm.tar.xz -C /tmp
          fi

      - name: Build bootstrap via cmake
        run: |
          export PATH="/tmp/llvm-21/bin:$PATH"
          mv build.sig build.sig.bak
          mkdir -p build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="/tmp/llvm-21" -DCMAKE_INSTALL_PREFIX="$PWD/../bootstrap" -DZIG_USE_LLVM_CONFIG=ON
          ninja install -j$(getconf _NPROCESSORS_ONLN)
          cd .. && mv build.sig.bak build.sig
          ./bootstrap/bin/sig version
        timeout-minutes: 60

      - name: Upload bootstrap
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-sig
          path: bootstrap/
          retention-days: 1

  build:
    needs: bootstrap
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            zig_target: x86_64-linux-musl
            ext: tar.xz
            runner: ubuntu-latest
            use_bootstrap: true
          - target: aarch64-linux
            zig_target: aarch64-linux-musl
            ext: tar.xz
            runner: ubuntu-latest
            use_bootstrap: true
          - target: aarch64-macos
            zig_target: aarch64-macos
            ext: tar.xz
            runner: ubuntu-latest
            use_bootstrap: true
          - target: x86_64-windows
            zig_target: x86_64-windows
            ext: zip
            runner: windows-latest
            use_bootstrap: false
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache zig-cache
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-${{ matrix.target }}-${{ github.sha }}
          restore-keys: zig-cache-${{ matrix.target }}-

      - name: Download bootstrap
        if: matrix.use_bootstrap
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-sig
          path: /tmp/bootstrap

      - name: Setup bootstrap
        if: matrix.use_bootstrap
        run: |
          chmod +x /tmp/bootstrap/bin/sig
          echo "/tmp/bootstrap/bin" >> "$GITHUB_PATH"

      - name: Setup Zig (Windows native)
        if: "!matrix.use_bootstrap"
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Write build_options.zig
        shell: bash
        run: |
          mkdir -p .zig-cache
          cat > .zig-cache/build_options.zig << 'ENDOPTS'
          pub const have_llvm = false;
          pub const llvm_has_m68k = false;
          pub const llvm_has_csky = false;
          pub const llvm_has_arc = false;
          pub const llvm_has_xtensa = false;
          pub const version: [:0]const u8 = "0.16.0-dev";
          pub const semver = @import("std").SemanticVersion.parse(version) catch unreachable;
          pub const enable_debug_extensions = false;
          pub const enable_logging = false;
          pub const enable_link_snapshots = false;
          pub const enable_tracy = false;
          pub const value_tracing = false;
          pub const skip_non_native = false;
          pub const debug_gpa = false;
          pub const dev = .full;
          pub const io_mode: enum { threaded, evented } = .threaded;
          pub const value_interpret_mode = .direct;
          pub const sig_version: [:0]const u8 = "0.1.0-dev";
          pub const mem_leak_frames = 4;
          ENDOPTS

      - name: Build sig
        shell: bash
        run: |
          OUT="sig-${VERSION}-${{ matrix.target }}"
          mkdir -p "${OUT}/bin"
          BIN="sig"; [ "${{ matrix.target }}" = "x86_64-windows" ] && BIN="sig.exe"
          COMPILER="sig"; [ "${{ matrix.use_bootstrap }}" = "false" ] && COMPILER="zig"
          EXTRA_ARGS=""
          [ "${{ matrix.use_bootstrap }}" = "true" ] && EXTRA_ARGS="-target ${{ matrix.zig_target }} -j$(getconf _NPROCESSORS_ONLN)"
          ${COMPILER} build-exe \
            --dep build_options --dep aro \
            -Mroot=src/main.zig \
            -Mbuild_options=.zig-cache/build_options.zig \
            -Maro=lib/compiler/aro/aro.zig \
            -O ReleaseSafe \
            -femit-bin="${OUT}/bin/${BIN}" \
            --cache-dir .zig-cache \
            --zig-lib-dir lib \
            ${EXTRA_ARGS}
          ls -la "${OUT}/bin/"
        timeout-minutes: 120

      - name: Install lib
        shell: bash
        run: |
          OUT="sig-${VERSION}-${{ matrix.target }}"
          mkdir -p "${OUT}/lib/zig"
          cp -r lib/. "${OUT}/lib/zig/"

      - name: Verify binary
        shell: bash
        run: |
          BIN="sig"; [ "${{ matrix.target }}" = "x86_64-windows" ] && BIN="sig.exe"
          FILE="sig-${VERSION}-${{ matrix.target }}/bin/${BIN}"
          [ ! -f "$FILE" ] && echo "ERROR: $FILE not found" && exit 1
          if [ "${{ matrix.target }}" = "x86_64-windows" ]; then
            MAGIC=$(od -A n -t x1 -N 2 "$FILE" | tr -d ' ')
            [ "$MAGIC" != "4d5a" ] && echo "ERROR: Not PE (magic: $MAGIC)" && exit 1
          fi
          echo "OK: $(ls -la "$FILE")"

      - name: Package tarball
        if: matrix.ext == 'tar.xz'
        shell: bash
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
          tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip
        if: matrix.ext == 'zip'
        shell: bash
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.zip"
          7z a -tzip "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Checksum
        shell: bash
        run: sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    needs: [bootstrap, build]
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sig-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts || { echo "No artifacts"; exit 1; }
          cat *.sha256 > sha256sums.txt 2>/dev/null || true
          PRERELEASE="${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true') && '--prerelease' || '' }}"
          ARCHIVES=""
          for f in sig-*.tar.xz sig-*.zip; do [ -f "$f" ] && ARCHIVES="$ARCHIVES $f"; done
          [ -z "$ARCHIVES" ] && echo "No archives" && exit 1
          # Delete existing release with same tag if present
          gh release delete "sig-${VERSION}" --yes 2>/dev/null || true
          gh release create "sig-${VERSION}" --title "Sig ${VERSION}" \
            --notes "Sig ${VERSION}

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          Checksums in sha256sums.txt." \
            ${PRERELEASE} $ARCHIVES sha256sums.txt
