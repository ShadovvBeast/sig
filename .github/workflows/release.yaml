# [sig] Release pipeline — bootstrap + LLVM cross-compile for all 4 platforms
#
# Architecture:
#   bootstrap: Resolve version + fast Debug build of sig (no lib, no langref)
#   build:     4-way matrix using bootstrap binary + LLVM 19 for ReleaseSafe
#   release:   Collect artifacts, checksums, publish GitHub release
name: release

on:
  repository_dispatch:
    types: [sig-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIG_VER="${{ inputs.version }}"
            echo "is_prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            SIG_MAJOR=$(grep -oP 'sig_version.*major = \K\d+' build.sig)
            SIG_MINOR=$(grep -oP 'sig_version.*minor = \K\d+' build.sig)
            SIG_PATCH=$(grep -oP 'sig_version.*patch = \K\d+' build.sig)
            SIG_PRE=$(grep -oP 'sig_version.*pre = "\K[^"]+' build.sig || true)
            if [ -n "$SIG_PRE" ]; then
              SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}-${SIG_PRE}"
            else
              SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}"
            fi
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          ZIG_MAJOR=$(grep -oP 'zig_version.*major = \K\d+' build.sig)
          ZIG_MINOR=$(grep -oP 'zig_version.*minor = \K\d+' build.sig)
          ZIG_PATCH=$(grep -oP 'zig_version.*patch = \K\d+' build.sig)
          ZIG_VER="${ZIG_MAJOR}.${ZIG_MINOR}.${ZIG_PATCH}"
          SIG_HASH=$(git rev-parse --short=7 HEAD)
          VERSION="${SIG_VER}+zig${ZIG_VER}.${SIG_HASH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: sig=${SIG_VER}, zig=${ZIG_VER}, hash=${SIG_HASH}, full=${VERSION}"

      - name: Install Sig compiler
        uses: ./tools/setup-sig
        with:
          version: latest

      - name: Build bootstrap sig binary (Debug, minimal)
        run: |
          echo "Bootstrap: building fast Debug sig binary..."
          sig build \
            -Doptimize=Debug \
            -Dno-lib \
            -Dno-langref \
            --prefix bootstrap-sig \
            --maxrss 0
          ls -la bootstrap-sig/bin/
          bootstrap-sig/bin/sig version
        timeout-minutes: 30

      - name: Upload bootstrap compiler
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-sig
          path: bootstrap-sig/

  build:
    needs: bootstrap
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            zig_target: x86_64-linux-musl
            ext: tar.xz
          - target: aarch64-linux
            zig_target: aarch64-linux-musl
            ext: tar.xz
          - target: aarch64-macos
            zig_target: aarch64-macos
            ext: tar.xz
          - target: x86_64-windows
            zig_target: x86_64-windows
            ext: zip
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bootstrap compiler
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-sig
          path: bootstrap-sig

      - name: Install bootstrap sig on PATH
        run: |
          chmod +x bootstrap-sig/bin/sig
          echo "$PWD/bootstrap-sig/bin" >> "$GITHUB_PATH"
          bootstrap-sig/bin/sig version

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-21-dev lld-21 libclang-21-dev liblld-21-dev
        timeout-minutes: 10

      - name: Build sig for ${{ matrix.target }}
        run: |
          echo "Building ${{ matrix.zig_target }} with LLVM (ReleaseSafe)..."
          sig build \
            -Dtarget=${{ matrix.zig_target }} \
            -Doptimize=ReleaseSafe \
            -Denable-llvm \
            -Dstatic-llvm \
            -Dno-lib \
            -Dno-langref \
            --prefix "sig-${VERSION}-${{ matrix.target }}" \
            --maxrss 0
        timeout-minutes: 120

      - name: Install lib files
        run: |
          sig build \
            -Dlib-files-only \
            --prefix "sig-${VERSION}-${{ matrix.target }}" \
            --maxrss 0
        timeout-minutes: 10

      - name: Run side-by-side benchmarks
        if: matrix.target == 'x86_64-linux'
        run: |
          echo "Running sig build --benchmark (side-by-side comparison)..."
          mkdir -p benchmark-results
          # Use the freshly-built release binary for benchmarks
          SIG_BIN="sig-${VERSION}-x86_64-linux/bin/sig"
          if [ -x "$SIG_BIN" ]; then
            "$SIG_BIN" build --benchmark 2>&1 | tee benchmark-results/release-benchmark.txt
          else
            sig build --benchmark 2>&1 | tee benchmark-results/release-benchmark.txt
          fi
        timeout-minutes: 30
        continue-on-error: true

      - name: Upload benchmark results
        if: matrix.target == 'x86_64-linux'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results/
          if-no-files-found: ignore

      - name: Package tarball
        if: matrix.ext == 'tar.xz'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
          tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip
        if: matrix.ext == 'zip'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.zip"
          cd "sig-${VERSION}-${{ matrix.target }}"
          zip -r "../${ARCHIVE}" .
          cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: |
          sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    needs: [bootstrap, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sig-*
          merge-multiple: true

      - name: Combine checksums
        run: |
          cd artifacts
          cat *.sha256 > sha256sums.txt
          echo "=== sha256sums.txt ==="
          cat sha256sums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="sig-${VERSION}"
            TITLE="Sig ${VERSION}"
            PRERELEASE="${{ inputs.prerelease == 'true' && '--prerelease' || '' }}"
          else
            TAG="sig-${VERSION}"
            TITLE="Sig ${VERSION}"
            PRERELEASE="--prerelease"
          fi

          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes "Sig ${VERSION} — Strict Zig compiler release.

          ## Downloads

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          All release binaries built with LLVM 21 (ReleaseSafe).

          Checksums are in \`sha256sums.txt\`." \
            ${PRERELEASE} \
            sig-*.tar.xz sig-*.zip sha256sums.txt
