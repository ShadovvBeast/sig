# [sig] Release pipeline — cmake bootstrap + LLVM builds for all 4 platforms
name: release

on:
  repository_dispatch:
    types: [sig-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIG_VER="${{ inputs.version }}"
          else
            SIG_MAJOR=$(grep -oP 'sig_version.*major = \K\d+' build.sig)
            SIG_MINOR=$(grep -oP 'sig_version.*minor = \K\d+' build.sig)
            SIG_PATCH=$(grep -oP 'sig_version.*patch = \K\d+' build.sig)
            SIG_PRE=$(grep -oP 'sig_version.*pre = "\K[^"]+' build.sig || true)
            [ -n "$SIG_PRE" ] && SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}-${SIG_PRE}" || SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}"
          fi
          ZIG_MAJOR=$(grep -oP 'zig_version.*major = \K\d+' build.sig)
          ZIG_MINOR=$(grep -oP 'zig_version.*minor = \K\d+' build.sig)
          ZIG_PATCH=$(grep -oP 'zig_version.*patch = \K\d+' build.sig)
          VERSION="${SIG_VER}+zig${ZIG_MAJOR}.${ZIG_MINOR}.${ZIG_PATCH}.$(git rev-parse --short=7 HEAD)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-21-dev lld-21 libclang-21-dev liblld-21-dev zlib1g-dev libzstd-dev cmake ninja-build
        timeout-minutes: 10

      - name: Build sig with cmake (stage 1+2 with LLVM)
        run: |
          mkdir build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="/usr/lib/llvm-21" \
            -DCMAKE_INSTALL_PREFIX="$PWD/../bootstrap-sig" \
            -DZIG_TARGET_TRIPLE="x86_64-linux-musl" \
            -DZIG_TARGET_MCPU=baseline
          ninja install -j$(nproc)
          cd ..
          bootstrap-sig/bin/sig version
        timeout-minutes: 60

      - name: Upload bootstrap compiler
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-sig
          path: bootstrap-sig/

  build:
    needs: bootstrap
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            zig_target: x86_64-linux-musl
            ext: tar.xz
          - target: aarch64-linux
            zig_target: aarch64-linux-musl
            ext: tar.xz
          - target: aarch64-macos
            zig_target: aarch64-macos
            ext: tar.xz
          - target: x86_64-windows
            zig_target: x86_64-windows
            ext: zip
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download bootstrap compiler
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-sig
          path: bootstrap-sig
      - name: Install bootstrap sig
        run: |
          chmod +x bootstrap-sig/bin/sig
          echo "$PWD/bootstrap-sig/bin" >> "$GITHUB_PATH"

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-21-dev lld-21 libclang-21-dev liblld-21-dev zlib1g-dev libzstd-dev
          for lib in libz.a libz.so libzstd.a libzstd.so; do
            [ -e "/usr/lib/x86_64-linux-gnu/$lib" ] && sudo ln -sf "/usr/lib/x86_64-linux-gnu/$lib" "/usr/lib/llvm-21/lib/$lib"
          done
        timeout-minutes: 10

      - name: Build sig for ${{ matrix.target }}
        run: |
          sig build \
            -Dtarget=${{ matrix.zig_target }} \
            -Doptimize=ReleaseSafe \
            -Denable-llvm \
            -Dstatic-llvm \
            -Dno-lib \
            -Dno-langref \
            --search-prefix /usr/lib/llvm-21 \
            --prefix "sig-${VERSION}-${{ matrix.target }}" \
            --maxrss 0
        timeout-minutes: 120

      - name: Install lib files
        run: sig build -Dlib-files-only --prefix "sig-${VERSION}-${{ matrix.target }}" --maxrss 0
        timeout-minutes: 10

      - name: Run benchmarks
        if: matrix.target == 'x86_64-linux'
        run: |
          mkdir -p benchmark-results
          SIG_BIN="sig-${VERSION}-x86_64-linux/bin/sig"
          [ -x "$SIG_BIN" ] && "$SIG_BIN" build --benchmark 2>&1 | tee benchmark-results/release-benchmark.txt || true
        timeout-minutes: 30
        continue-on-error: true

      - name: Upload benchmark results
        if: matrix.target == 'x86_64-linux'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results/
          if-no-files-found: ignore

      - name: Package tarball
        if: matrix.ext == 'tar.xz'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
          tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip
        if: matrix.ext == 'zip'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.zip"
          cd "sig-${VERSION}-${{ matrix.target }}" && zip -r "../${ARCHIVE}" . && cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    needs: [bootstrap, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sig-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          cat *.sha256 > sha256sums.txt
          PRERELEASE="${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true') && '--prerelease' || '--prerelease' }}"
          gh release create "sig-${VERSION}" --title "Sig ${VERSION}" \
            --notes "Sig ${VERSION}

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          Built with LLVM 21. Checksums in sha256sums.txt." \
            ${PRERELEASE} sig-*.tar.xz sig-*.zip sha256sums.txt
