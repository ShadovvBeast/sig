# [sig] Build and publish Sig compiler releases — all 4 platforms
# Stage 1: Build x86_64-linux natively (self-hosted backend)
# Stage 2: Use stage 1 binary + LLVM to cross-compile aarch64-linux, aarch64-macos, x86_64-windows
name: release

on:
  repository_dispatch:
    types: [sig-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIG_VER="${{ inputs.version }}"
            echo "is_prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            SIG_MAJOR=$(grep -oP 'sig_version.*major = \K\d+' build.sig)
            SIG_MINOR=$(grep -oP 'sig_version.*minor = \K\d+' build.sig)
            SIG_PATCH=$(grep -oP 'sig_version.*patch = \K\d+' build.sig)
            SIG_PRE=$(grep -oP 'sig_version.*pre = "\K[^"]+' build.sig || true)
            if [ -n "$SIG_PRE" ]; then
              SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}-${SIG_PRE}"
            else
              SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}"
            fi
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          ZIG_MAJOR=$(grep -oP 'zig_version.*major = \K\d+' build.sig)
          ZIG_MINOR=$(grep -oP 'zig_version.*minor = \K\d+' build.sig)
          ZIG_PATCH=$(grep -oP 'zig_version.*patch = \K\d+' build.sig)
          ZIG_VER="${ZIG_MAJOR}.${ZIG_MINOR}.${ZIG_PATCH}"
          SIG_HASH=$(git rev-parse --short=7 HEAD)
          VERSION="${SIG_VER}+zig${ZIG_VER}.${SIG_HASH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: sig=${SIG_VER}, zig=${ZIG_VER}, hash=${SIG_HASH}, full=${VERSION}"

  # ── Stage 1: Build x86_64-linux natively ─────────────────────────────
  # The self-hosted backend works for x86_64. This produces the compiler
  # binary we'll use in stage 2 for cross-compilation.
  build-native:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Sig compiler
        uses: ./tools/setup-sig
        with:
          version: latest

      - name: Build x86_64-linux natively
        run: |
          echo "Stage 1: Building x86_64-linux natively..."
          sig build \
            -Doptimize=ReleaseSafe \
            -Dno-lib \
            -Dno-langref \
            --prefix "sig-${VERSION}-x86_64-linux" \
            --maxrss 0
        timeout-minutes: 120

      - name: Install lib files
        run: |
          sig build \
            -Dlib-files-only \
            --prefix "sig-${VERSION}-x86_64-linux" \
            --maxrss 0
        timeout-minutes: 10

      - name: Package x86_64-linux tarball
        run: |
          tar -cJf "sig-${VERSION}-x86_64-linux.tar.xz" "sig-${VERSION}-x86_64-linux"

      - name: Upload x86_64-linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-x86_64-linux
          path: sig-${{ env.VERSION }}-x86_64-linux.tar.xz

      # Also upload the raw binary for stage 2 cross-compilation
      - name: Upload stage 1 compiler for cross-compilation
        uses: actions/upload-artifact@v4
        with:
          name: sig-stage1-compiler
          path: sig-${{ env.VERSION }}-x86_64-linux/

      - name: Benchmark build performance
        run: |
          mkdir -p benchmark-results
          sig build --benchmark | tee benchmark-results/release-benchmark.txt
        timeout-minutes: 30
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-release
          path: benchmark-results/
          if-no-files-found: ignore

  # ── Stage 2: Cross-compile other targets using stage 1 + LLVM ────────
  # The self-hosted aarch64/wasm backends have codegen bugs. We use the
  # freshly-built x86_64-linux sig binary with LLVM to cross-compile.
  build-cross:
    needs: [resolve-version, build-native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux
            zig_target: aarch64-linux-musl
            ext: tar.xz
          - target: aarch64-macos
            zig_target: aarch64-macos
            ext: tar.xz
          - target: x86_64-windows
            zig_target: x86_64-windows
            ext: zip
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download stage 1 compiler
        uses: actions/download-artifact@v4
        with:
          name: sig-stage1-compiler
          path: stage1-sig

      - name: Install stage 1 sig on PATH
        run: |
          chmod +x stage1-sig/bin/sig
          echo "$PWD/stage1-sig/bin" >> "$GITHUB_PATH"
          # Verify it works
          stage1-sig/bin/sig version

      - name: Install LLVM 19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-19-dev lld-19 libclang-19-dev liblld-19-dev
          echo "LLVM 19 installed"
        timeout-minutes: 10

      - name: Cross-compile for ${{ matrix.target }}
        run: |
          echo "Stage 2: Cross-compiling for ${{ matrix.zig_target }} with LLVM..."
          sig build \
            -Dtarget=${{ matrix.zig_target }} \
            -Doptimize=ReleaseSafe \
            -Denable-llvm \
            -Dstatic-llvm \
            -Dno-lib \
            -Dno-langref \
            --prefix "sig-${VERSION}-${{ matrix.target }}" \
            --maxrss 0
        timeout-minutes: 120

      - name: Install lib files
        run: |
          sig build \
            -Dlib-files-only \
            --prefix "sig-${VERSION}-${{ matrix.target }}" \
            --maxrss 0
        timeout-minutes: 10

      - name: Package tarball (Linux/macOS)
        if: matrix.ext == 'tar.xz'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
          tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip (Windows)
        if: matrix.ext == 'zip'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.zip"
          cd "sig-${VERSION}-${{ matrix.target }}"
          zip -r "../${ARCHIVE}" .
          cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # ── Release: collect all artifacts and publish ───────────────────────
  release:
    needs: [resolve-version, build-native, build-cross]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sig-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum sig-*.tar.xz sig-*.zip 2>/dev/null > sha256sums.txt || true
          echo "=== sha256sums.txt ==="
          cat sha256sums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="sig-${VERSION}"
            TITLE="Sig ${VERSION}"
            PRERELEASE="${{ inputs.prerelease == 'true' && '--prerelease' || '' }}"
          else
            TAG="sig-${VERSION}"
            TITLE="Sig ${VERSION}"
            PRERELEASE="--prerelease"
          fi

          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes "Sig ${VERSION} — Strict Zig compiler release.

          ## Downloads

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          x86_64-linux built natively. Other targets cross-compiled with LLVM.

          Checksums are in \`sha256sums.txt\`." \
            ${PRERELEASE} \
            sig-*.tar.xz sig-*.zip sha256sums.txt
