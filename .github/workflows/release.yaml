# [sig] Release pipeline — build LLVM from source, then build sig for all 4 platforms
# This is a one-time bootstrap. Once 0.0.3 ships, future releases use the new build system.
name: release

on:
  repository_dispatch:
    types: [sig-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIG_VER="${{ inputs.version }}"
          else
            SIG_MAJOR=$(grep -oP 'sig_version.*major = \K\d+' build.sig)
            SIG_MINOR=$(grep -oP 'sig_version.*minor = \K\d+' build.sig)
            SIG_PATCH=$(grep -oP 'sig_version.*patch = \K\d+' build.sig)
            SIG_PRE=$(grep -oP 'sig_version.*pre = "\K[^"]+' build.sig || true)
            [ -n "$SIG_PRE" ] && SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}-${SIG_PRE}" || SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}"
          fi
          ZIG_MAJOR=$(grep -oP 'zig_version.*major = \K\d+' build.sig)
          ZIG_MINOR=$(grep -oP 'zig_version.*minor = \K\d+' build.sig)
          ZIG_PATCH=$(grep -oP 'zig_version.*patch = \K\d+' build.sig)
          VERSION="${SIG_VER}+zig${ZIG_MAJOR}.${ZIG_MINOR}.${ZIG_PATCH}.$(git rev-parse --short=7 HEAD)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build python3 zlib1g-dev libzstd-dev
        timeout-minutes: 5

      - name: Build LLVM 21 from source
        run: |
          LLVM_VERSION="llvmorg-21.1.2"
          echo "Cloning LLVM ${LLVM_VERSION}..."
          git clone --depth 1 --branch "${LLVM_VERSION}" https://github.com/llvm/llvm-project.git llvm-src

          echo "Building LLVM+Clang+LLD with all targets..."
          cmake -S llvm-src/llvm -B llvm-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/llvm-21" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;AMDGPU;ARM;AVR;BPF;Hexagon;Lanai;LoongArch;Mips;MSP430;NVPTX;PowerPC;RISCV;Sparc;SystemZ;VE;WebAssembly;X86;XCore" \
            -DLLVM_EXPERIMENTAL_TARGETS_TO_BUILD="M68k;Xtensa;ARC;CSKY;SPIRV" \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=FORCE_ON \
            -DLLVM_ENABLE_ZSTD=FORCE_ON \
            -DLLVM_STATIC_LINK_CXX_STDLIB=ON \
            -DLLVM_USE_STATIC_ZSTD=ON \
            -DCLANG_ENABLE_ARCMT=OFF \
            -DCLANG_ENABLE_STATIC_ANALYZER=ON \
            -DLLVM_ENABLE_BINDINGS=OFF \
            -DLLVM_ENABLE_OCAMLDOC=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF
          ninja -C llvm-build install -j$(nproc)
          echo "LLVM installed to $HOME/llvm-21"
          ls "$HOME/llvm-21/lib/" | head -5
        timeout-minutes: 120

      - name: Build sig with cmake
        run: |
          export PATH="$HOME/llvm-21/bin:$PATH"
          mkdir build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$HOME/llvm-21" \
            -DCMAKE_INSTALL_PREFIX="$PWD/../bootstrap-sig" \
            -DZIG_TARGET_TRIPLE="x86_64-linux-musl" \
            -DZIG_TARGET_MCPU=baseline \
            -DZIG_STATIC=ON \
            -DZIG_NO_LIB=ON \
            -DZIG_USE_LLVM_CONFIG=ON
          ninja install -j$(nproc)
          cd ..
          bootstrap-sig/bin/sig version
        timeout-minutes: 60

      - name: Upload bootstrap compiler
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-sig
          path: bootstrap-sig/

      # Also upload LLVM for the build stage so we don't rebuild it 4 times
      - name: Package LLVM prefix
        run: tar -cJf llvm-21-prefix.tar.xz -C "$HOME" llvm-21
        timeout-minutes: 10

      - name: Upload LLVM prefix
        uses: actions/upload-artifact@v4
        with:
          name: llvm-21-prefix
          path: llvm-21-prefix.tar.xz

  build:
    needs: bootstrap
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            zig_target: x86_64-linux-musl
            ext: tar.xz
          - target: aarch64-linux
            zig_target: aarch64-linux-musl
            ext: tar.xz
          - target: aarch64-macos
            zig_target: aarch64-macos
            ext: tar.xz
          - target: x86_64-windows
            zig_target: x86_64-windows
            ext: zip
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bootstrap compiler
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-sig
          path: bootstrap-sig

      - name: Download LLVM prefix
        uses: actions/download-artifact@v4
        with:
          name: llvm-21-prefix

      - name: Install bootstrap sig and LLVM
        run: |
          chmod +x bootstrap-sig/bin/sig
          echo "$PWD/bootstrap-sig/bin" >> "$GITHUB_PATH"
          tar -xJf llvm-21-prefix.tar.xz -C "$HOME"
          echo "LLVM_PREFIX=$HOME/llvm-21" >> "$GITHUB_ENV"

      - name: Build sig for ${{ matrix.target }}
        run: |
          sig build \
            -Dtarget=${{ matrix.zig_target }} \
            -Doptimize=ReleaseSafe \
            -Denable-llvm \
            -Dstatic-llvm \
            -Dno-lib \
            -Dno-langref \
            --search-prefix "$LLVM_PREFIX" \
            --prefix "sig-${VERSION}-${{ matrix.target }}" \
            --maxrss 0
        timeout-minutes: 120

      - name: Install lib files
        run: sig build -Dlib-files-only --prefix "sig-${VERSION}-${{ matrix.target }}" --maxrss 0
        timeout-minutes: 10

      - name: Run benchmarks
        if: matrix.target == 'x86_64-linux'
        run: |
          mkdir -p benchmark-results
          SIG_BIN="sig-${VERSION}-x86_64-linux/bin/sig"
          [ -x "$SIG_BIN" ] && "$SIG_BIN" build --benchmark 2>&1 | tee benchmark-results/release-benchmark.txt || true
        timeout-minutes: 30
        continue-on-error: true

      - name: Upload benchmark results
        if: matrix.target == 'x86_64-linux'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results/
          if-no-files-found: ignore

      - name: Package tarball
        if: matrix.ext == 'tar.xz'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
          tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip
        if: matrix.ext == 'zip'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.zip"
          cd "sig-${VERSION}-${{ matrix.target }}" && zip -r "../${ARCHIVE}" . && cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    needs: [bootstrap, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sig-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          cat *.sha256 > sha256sums.txt
          PRERELEASE="${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true') && '--prerelease' || '--prerelease' }}"
          gh release create "sig-${VERSION}" --title "Sig ${VERSION}" \
            --notes "Sig ${VERSION}

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          Built with LLVM 21 (ReleaseSafe). Checksums in sha256sums.txt." \
            ${PRERELEASE} sig-*.tar.xz sig-*.zip sha256sums.txt
