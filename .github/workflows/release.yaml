# [sig] Build and publish Sig compiler releases
name: release

on:
  # Auto-triggered by sig-sync after successful upstream merge
  repository_dispatch:
    types: [sig-release]
  # Manual trigger for tagged releases
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            # Auto-release: derive version from zig version output or git
            # Use short SHA + date for dev releases
            SHORT_SHA=$(git rev-parse --short HEAD)
            DATE=$(date -u +%Y%m%d)
            VERSION="0.0.1-dev.${DATE}+${SHORT_SHA}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved version: $(cat "$GITHUB_OUTPUT" | grep version)"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            ext: tar.xz
          - target: aarch64-linux
            os: ubuntu-latest
            ext: tar.xz
          - target: aarch64-macos
            os: ubuntu-latest
            ext: tar.xz
          - target: x86_64-windows
            os: ubuntu-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Zig (bootstrap compiler)
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master

      - name: Build release binary
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          # Map matrix target to zig target triple
          case "$TARGET" in
            x86_64-linux)    ZIG_TARGET="x86_64-linux-musl" ;;
            aarch64-linux)   ZIG_TARGET="aarch64-linux-musl" ;;
            aarch64-macos)   ZIG_TARGET="aarch64-macos" ;;
            x86_64-windows)  ZIG_TARGET="x86_64-windows" ;;
          esac

          echo "Building for ${ZIG_TARGET}..."
          sig build \
            -Dtarget="${ZIG_TARGET}" \
            -Doptimize=ReleaseSafe \
            --prefix "sig-${VERSION}-${TARGET}" \
            --maxrss 0
        timeout-minutes: 120

      - name: Package tarball (Linux/macOS)
        if: matrix.ext == 'tar.xz'
        shell: bash
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
          tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $archive = "sig-${env:VERSION}-${{ matrix.target }}.zip"
          Compress-Archive -Path "sig-${env:VERSION}-${{ matrix.target }}" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"
          else
            shasum -a 256 "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Combine checksums
        run: |
          cd artifacts
          cat *.sha256 > sha256sums.txt
          echo "=== sha256sums.txt ==="
          cat sha256sums.txt

      - name: Delete previous master release (auto-release only)
        if: needs.resolve-version.outputs.is_prerelease == 'true' && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete master --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          # Use "master" tag for auto-releases, "v{VERSION}" for manual
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${VERSION}"
            TITLE="Sig v${VERSION}"
            PRERELEASE="${{ inputs.prerelease == 'true' && '--prerelease' || '' }}"
          else
            TAG="master"
            TITLE="Sig master (${VERSION})"
            PRERELEASE="--prerelease"
          fi

          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes "Sig ${VERSION} — Strict Zig compiler release.

          ## Downloads

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          Checksums are in \`sha256sums.txt\`." \
            ${PRERELEASE} \
            sig-*.tar.xz sig-*.zip sha256sums.txt
