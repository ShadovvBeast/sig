# [sig] Release pipeline — cmake bootstrap from pre-built LLVM, then cross-compile
#
# Strategy: build a bootstrap sig binary via cmake + LLVM on Linux,
# then use it to cross-compile for all targets via `sig build-exe` directly.
# This bypasses build.sig entirely — no sig_build module needed.
name: release

on:
  repository_dispatch:
    types: [sig-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0-dev)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  LLVM_URL: https://github.com/SB0LTD/sig/releases/download/llvm-21/llvm-21-x86_64-linux.tar.xz

jobs:
  # Step 1: Build a bootstrap sig binary via cmake + LLVM on Linux.
  # This produces a native x86_64-linux sig binary that can cross-compile.
  bootstrap:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIG_VER="${{ inputs.version }}"
          else
            SIG_MAJOR=$(sed -n 's/.*sig_version.*major = \([0-9]*\).*/\1/p' build.sig | head -1)
            SIG_MINOR=$(sed -n 's/.*sig_version.*minor = \([0-9]*\).*/\1/p' build.sig | head -1)
            SIG_PATCH=$(sed -n 's/.*sig_version.*patch = \([0-9]*\).*/\1/p' build.sig | head -1)
            SIG_PRE=$(sed -n 's/.*sig_version.*pre = "\([^"]*\)".*/\1/p' build.sig | head -1)
            [ -n "$SIG_PRE" ] && SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}-${SIG_PRE}" || SIG_VER="${SIG_MAJOR}.${SIG_MINOR}.${SIG_PATCH}"
          fi
          ZIG_MAJOR=$(sed -n 's/.*zig_version.*major = \([0-9]*\).*/\1/p' build.sig | head -1)
          ZIG_MINOR=$(sed -n 's/.*zig_version.*minor = \([0-9]*\).*/\1/p' build.sig | head -1)
          ZIG_PATCH=$(sed -n 's/.*zig_version.*patch = \([0-9]*\).*/\1/p' build.sig | head -1)
          VERSION="${SIG_VER}+zig${ZIG_MAJOR}.${ZIG_MINOR}.${ZIG_PATCH}.$(git rev-parse --short=7 HEAD)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "==> Version: ${VERSION}"

      - name: Cache LLVM
        uses: actions/cache@v4
        with:
          path: /tmp/llvm-21
          key: llvm-21-x86_64-linux-${{ hashFiles('.github/workflows/release.yaml') }}
          restore-keys: llvm-21-x86_64-linux-

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build zlib1g-dev libzstd-dev

      - name: Download pre-built LLVM 21
        run: |
          if [ ! -d /tmp/llvm-21 ]; then
            curl -fsSL "$LLVM_URL" -o /tmp/llvm.tar.xz
            tar -xJf /tmp/llvm.tar.xz -C /tmp
          fi
          echo "LLVM ready: $(ls /tmp/llvm-21/bin/llvm-config 2>/dev/null && echo OK || echo MISSING)"

      - name: Build bootstrap via cmake
        run: |
          export PATH="/tmp/llvm-21/bin:$PATH"
          # Temporarily hide build.sig so cmake doesn't get confused
          mv build.sig build.sig.bak
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="/tmp/llvm-21" \
            -DCMAKE_INSTALL_PREFIX="$PWD/../bootstrap" \
            -DZIG_USE_LLVM_CONFIG=ON
          ninja install -j$(getconf _NPROCESSORS_ONLN)
          cd ..
          mv build.sig.bak build.sig
          echo "==> Bootstrap built:"
          ./bootstrap/bin/sig version
        timeout-minutes: 60

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-sig
          path: bootstrap/
          retention-days: 1


  # Step 2: Use the bootstrap to cross-compile sig for all targets.
  # All jobs run on ubuntu-latest using the bootstrap binary.
  # Cross-compilation via `sig build-exe` directly (bypasses build.sig).
  build:
    needs: bootstrap
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            zig_target: x86_64-linux-musl
            ext: tar.xz
          - target: aarch64-linux
            zig_target: aarch64-linux-musl
            ext: tar.xz
          - target: aarch64-macos
            zig_target: aarch64-macos
            ext: tar.xz
          - target: x86_64-windows
            zig_target: x86_64-windows-gnu
            ext: zip
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache zig-cache
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-${{ matrix.target }}-${{ github.sha }}
          restore-keys: zig-cache-${{ matrix.target }}-

      - name: Download bootstrap
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-sig
          path: /tmp/bootstrap

      - name: Setup bootstrap
        run: |
          chmod +x /tmp/bootstrap/bin/sig
          echo "/tmp/bootstrap/bin" >> "$GITHUB_PATH"
          /tmp/bootstrap/bin/sig version

      - name: Generate build_options.zig
        run: |
          mkdir -p .zig-cache
          cat > .zig-cache/build_options.zig << EOF
          pub const have_llvm = false;
          pub const llvm_has_m68k = false;
          pub const llvm_has_csky = false;
          pub const llvm_has_arc = false;
          pub const llvm_has_xtensa = false;
          pub const version: [:0]const u8 = "${VERSION}";
          pub const semver = @import("std").SemanticVersion.parse(version) catch unreachable;
          pub const enable_debug_extensions = false;
          pub const enable_logging = false;
          pub const enable_link_snapshots = false;
          pub const enable_tracy = false;
          pub const value_tracing = false;
          pub const skip_non_native = false;
          pub const debug_gpa = false;
          pub const dev = .core;
          pub const io_mode: enum { threaded, evented } = .threaded;
          pub const value_interpret_mode = .direct;
          pub const sig_version: [:0]const u8 = "${VERSION}";
          pub const mem_leak_frames = 4;
          EOF

      - name: Determine output binary name
        id: binname
        run: |
          if [ "${{ matrix.target }}" = "x86_64-windows" ]; then
            echo "bin=sig.exe" >> "$GITHUB_OUTPUT"
          else
            echo "bin=sig" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sig for ${{ matrix.target }}
        run: |
          OUT_DIR="sig-${VERSION}-${{ matrix.target }}"
          mkdir -p "${OUT_DIR}/bin"

          sig build-exe \
            --dep build_options --dep aro \
            -Mroot=src/main.zig \
            -Mbuild_options=.zig-cache/build_options.zig \
            -Maro=lib/compiler/aro/aro.zig \
            -O ReleaseSafe \
            -target ${{ matrix.zig_target }} \
            -femit-bin="${OUT_DIR}/bin/${{ steps.binname.outputs.bin }}" \
            --cache-dir .zig-cache \
            --zig-lib-dir "$(pwd)/lib" \
            -j$(getconf _NPROCESSORS_ONLN)

          echo "=== Output ==="
          ls -la "${OUT_DIR}/bin/"
        timeout-minutes: 120

      - name: Install lib files
        run: |
          OUT_DIR="sig-${VERSION}-${{ matrix.target }}"
          mkdir -p "${OUT_DIR}/lib/zig"
          cp -r lib/. "${OUT_DIR}/lib/zig/"

      - name: Verify binary format
        run: |
          BIN="sig-${VERSION}-${{ matrix.target }}/bin/${{ steps.binname.outputs.bin }}"
          if [ ! -f "$BIN" ]; then
            echo "ERROR: Binary not found: $BIN"
            exit 1
          fi
          if [ "${{ matrix.target }}" = "x86_64-windows" ]; then
            MAGIC=$(od -A n -t x1 -N 2 "$BIN" | tr -d ' ')
            if [ "$MAGIC" != "4d5a" ]; then
              echo "ERROR: Not a PE executable (magic: $MAGIC)"
              exit 1
            fi
          fi
          echo "Binary verified: $(ls -la "$BIN")"

      - name: Package tarball
        if: matrix.ext == 'tar.xz'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.tar.xz"
          tar -cJf "${ARCHIVE}" "sig-${VERSION}-${{ matrix.target }}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip
        if: matrix.ext == 'zip'
        run: |
          ARCHIVE="sig-${VERSION}-${{ matrix.target }}.zip"
          cd "sig-${VERSION}-${{ matrix.target }}" && zip -r "../${ARCHIVE}" . && cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256


  # Step 3: Create the GitHub release with all artifacts.
  release:
    needs: [bootstrap, build]
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bootstrap.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sig-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ 2>/dev/null || echo "No artifacts directory"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts || { echo "No artifacts to release"; exit 1; }

          # Combine checksums
          cat *.sha256 > sha256sums.txt 2>/dev/null || true

          PRERELEASE="${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true') && '--prerelease' || '' }}"

          # Collect available archives
          ARCHIVES=""
          for f in sig-*.tar.xz sig-*.zip; do
            [ -f "$f" ] && ARCHIVES="$ARCHIVES $f"
          done

          if [ -z "$ARCHIVES" ]; then
            echo "ERROR: No archives found to release"
            exit 1
          fi

          gh release create "sig-${VERSION}" --title "Sig ${VERSION}" \
            --notes "Sig ${VERSION} — built via cmake + LLVM bootstrap

          | Platform | Archive |
          |---|---|
          | Linux x86_64 | \`sig-${VERSION}-x86_64-linux.tar.xz\` |
          | Linux aarch64 | \`sig-${VERSION}-aarch64-linux.tar.xz\` |
          | macOS aarch64 | \`sig-${VERSION}-aarch64-macos.tar.xz\` |
          | Windows x86_64 | \`sig-${VERSION}-x86_64-windows.zip\` |

          Checksums in sha256sums.txt." \
            ${PRERELEASE} $ARCHIVES sha256sums.txt
