# Test compiling main.sig with the current bootstrap release
name: test-build-runner

on:
  workflow_dispatch:

env:
  BOOTSTRAP_URL: https://github.com/SB0LTD/sig/releases/download/sig-0.1.0-dev%2Bzig0.16.0.afaa4cd/sig-0.1.0-dev%2Bzig0.16.0.afaa4cd-x86_64-linux.tar.xz

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download bootstrap
        run: |
          mkdir -p /tmp/bs
          curl -fsSL "$BOOTSTRAP_URL" -o /tmp/bs.tar.xz
          tar -xJf /tmp/bs.tar.xz -C /tmp/bs --strip-components=1
          chmod +x /tmp/bs/bin/sig
          /tmp/bs/bin/sig version

      - name: Test compile main.sig directly
        run: |
          /tmp/bs/bin/sig build-exe \
            --dep sig --dep std \
            -Mroot=tools/sig_build/main.sig \
            -Msig=lib/sig/sig.zig \
            -Mstd=lib/std/std.zig \
            --zig-lib-dir lib \
            --cache-dir .zig-cache \
            --global-cache-dir .zig-cache
        timeout-minutes: 30

      - name: Test sig build (sigBuildDelegate path)
        run: |
          echo "=== Testing sigBuildDelegate path ==="
          /tmp/bs/bin/sig build --zig-lib-dir lib -Dno-lib -Dno-langref -Dno-bin 2>&1 || true
          echo "=== sigBuildDelegate failed, testing manual equivalent ==="
          # Reproduce what sigBuildDelegate does:
          # 1. Compile the build runner
          /tmp/bs/bin/sig build-exe \
            --dep sig --dep std \
            -Mroot=tools/sig_build/main.sig \
            -Msig=lib/sig/sig.zig \
            -Mstd=lib/std/std.zig \
            --cache-dir .zig-cache \
            --global-cache-dir .zig-cache \
            -femit-bin=.zig-cache/sig_build_runner \
            --zig-lib-dir lib
          echo "Build runner compiled OK"
          # 2. Run the build runner with the same argv protocol
          ./.zig-cache/sig_build_runner \
            /tmp/bs/bin/sig \
            lib \
            . \
            .zig-cache \
            .zig-cache \
            -Dno-lib -Dno-langref -Dno-bin
        timeout-minutes: 30
