# Build and publish fresh bootstrap compiler binaries.
# Linux job: uses existing bootstrap to self-host build.
# macOS job: cross-compiled from Linux bootstrap (no Zig needed).
name: build-bootstrap

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION: bootstrap-sig-v2
  BOOTSTRAP_URL: https://github.com/SB0LTD/sig/releases/download/bootstrap-sig-v2/bootstrap-sig-x86_64-linux.tar.gz

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bootstrap
        run: |
          mkdir -p /tmp/bootstrap-sig
          curl -fsSL "$BOOTSTRAP_URL" -o /tmp/bootstrap-sig.tar
          tar -xf /tmp/bootstrap-sig.tar -C /tmp/bootstrap-sig
          chmod +x /tmp/bootstrap-sig/bin/sig
          echo "/tmp/bootstrap-sig/bin" >> "$GITHUB_PATH"
          /tmp/bootstrap-sig/bin/sig version

      - name: Build x86_64-linux bootstrap
        run: |
          sig build \
            --zig-lib-dir lib \
            -Dtarget=x86_64-linux-musl \
            -Doptimize=ReleaseSafe \
            -Dno-langref \
            -Dskip-tests \
            --prefix bootstrap-sig-x86_64-linux \
            --maxrss 0
        timeout-minutes: 120

      - name: Build aarch64-macos bootstrap (cross from Linux)
        run: |
          sig build \
            --zig-lib-dir lib \
            -Dtarget=aarch64-macos \
            -Doptimize=ReleaseSafe \
            -Dno-langref \
            -Dskip-tests \
            --prefix bootstrap-sig-aarch64-macos \
            --maxrss 0
        timeout-minutes: 120

      - name: Verify and package
        run: |
          echo "=== x86_64-linux ==="
          file bootstrap-sig-x86_64-linux/bin/sig
          echo "=== aarch64-macos ==="
          file bootstrap-sig-aarch64-macos/bin/sig
          tar -czf bootstrap-sig-x86_64-linux.tar.gz -C bootstrap-sig-x86_64-linux .
          tar -czf bootstrap-sig-aarch64-macos.tar.gz -C bootstrap-sig-aarch64-macos .

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${VERSION}" >/dev/null 2>&1 || \
            gh release create "${VERSION}" \
              --title "Bootstrap Sig Compiler v2" \
              --notes "Bootstrap compiler binaries built from current master using sig build chain only." \
              --prerelease
          gh release upload "${VERSION}" bootstrap-sig-x86_64-linux.tar.gz --clobber
          gh release upload "${VERSION}" bootstrap-sig-aarch64-macos.tar.gz --clobber
